<!doctype html>
<html lang="en" data-resolution="landscape">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <style>
    html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #080c16; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="placeholder" data-start="0" data-duration="2"
       data-width="1920" data-height="1080" data-track-index="0">
    <!-- Placeholder root — every real render uses -c compositions/<file>.html instead -->
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    window.__timelines["placeholder"] = gsap.timeline({ paused: true });
  </script>
</body>
</html>
