<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; }
      body {
        background: radial-gradient(ellipse at center, #0a0d10 0%, #02030a 100%);
        font-family: "Courier New", monospace;
      }
      .grid {
        position: absolute;
        top: 60px; left: 60px;
        width: 1800px; height: 960px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 16px;
      }
      .cell {
        position: relative;
        background: #0a0a0a;
        border: 2px solid #1a3a3a;
        overflow: hidden;
        box-shadow: inset 0 0 30px rgba(0,255,170,0.04), 0 0 12px rgba(0,255,170,0.05);
      }
      .cell.main {
        grid-column: span 2;
        grid-row: span 2;
        border-color: #3aff7a;
        box-shadow: inset 0 0 60px rgba(0,255,170,0.10), 0 0 30px rgba(0,255,170,0.20);
      }
      .cell video {
        width: 100%; height: 100%; object-fit: cover;
        filter: brightness(0.95) saturate(0.7) hue-rotate(8deg);
      }
      .cell-label {
        position: absolute; top: 8px; left: 12px;
        font-size: 18px; color: #3aff7a;
        letter-spacing: 3px; text-shadow: 0 0 8px rgba(58,255,122,0.5);
        font-weight: bold;
      }
      .timestamp {
        position: absolute; bottom: 8px; right: 12px;
        font-size: 16px; color: #3aff7a;
        letter-spacing: 2px;
        text-shadow: 0 0 6px rgba(58,255,122,0.5);
        font-variant-numeric: tabular-nums;
      }
      .rec-dot {
        position: absolute; top: 12px; right: 14px;
        width: 12px; height: 12px; border-radius: 50%;
        background: #ff3a3a; box-shadow: 0 0 12px #ff3a3a;
      }
      /* CRT scanlines on every cell */
      .cell::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px);
      }
      .noise-cell {
        background-image:
          radial-gradient(circle at 30% 40%, rgba(255,255,255,0.05) 1px, transparent 2px),
          radial-gradient(circle at 70% 60%, rgba(255,255,255,0.04) 1px, transparent 2px);
        background-size: 4px 4px, 6px 6px;
      }
      .header-strip {
        position: absolute; top: 16px; left: 50%;
        transform: translateX(-50%);
        background: rgba(58,255,122,0.10);
        border: 1px solid rgba(58,255,122,0.5);
        padding: 6px 24px;
        font-size: 22px; color: #3aff7a; letter-spacing: 6px;
        font-weight: bold; opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="frame_surveillance" data-width="1920" data-height="1080">
      <div class="header-strip">CCTV · TEHRAN GRID · LIVE</div>
      <div class="grid">
        <div class="cell main">
          <video id="clip" class="clip" src="../assets/clips/clip_demo.mp4"
                 data-start="0" data-duration="5" data-track-index="0" data-has-audio="false"
                 muted playsinline></video>
          <div class="cell-label">CAM 01 · MAIN</div>
          <div class="timestamp">19·08·1953 · 18:43:12</div>
          <div class="rec-dot"></div>
        </div>
        <div class="cell noise-cell"><div class="cell-label">CAM 02</div><div class="timestamp">— SIGNAL —</div></div>
        <div class="cell noise-cell"><div class="cell-label">CAM 03</div><div class="timestamp">18:43:08</div></div>
        <div class="cell noise-cell"><div class="cell-label">CAM 04</div><div class="timestamp">18:43:11</div></div>
        <div class="cell noise-cell"><div class="cell-label">CAM 05</div><div class="timestamp">— OFFLINE</div></div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(".header-strip", { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.5 }, 0.3);
        tl.fromTo(".cell", { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.35, stagger: 0.12 }, 0.5);
        // Rec dot pulse — finite
        const dur = 5; const cycle = 0.6;
        const repeats = Math.max(0, Math.floor(dur/cycle)-1);
        tl.to(".rec-dot", { opacity: 0.3, duration: 0.3, repeat: repeats, yoyo: true, ease: "sine.inOut" }, 1.2);
        window.__timelines = window.__timelines || {};
        window.__timelines["frame_surveillance"] = tl;
      </script>
    </div>
  </body>
</html>
