<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; }
      body {
        background:
          radial-gradient(ellipse at 50% 75%, #4a2010 0%, #1a0808 50%, #050202 100%);
        font-family: "Times New Roman", serif;
      }
      /* Wall behind mantel */
      .wall {
        position: absolute; inset: 0;
        background:
          repeating-linear-gradient(0deg, rgba(60,30,10,0.04) 0px, transparent 100px);
      }
      /* Hearth glow */
      .hearth-glow {
        position: absolute; left: 50%; bottom: 0;
        transform: translateX(-50%);
        width: 1400px; height: 700px;
        background: radial-gradient(ellipse 700px 400px at center bottom, rgba(255,140,40,0.4) 0%, rgba(255,80,20,0.15) 40%, transparent 80%);
        pointer-events: none;
      }
      /* Fireplace */
      .fireplace {
        position: absolute;
        left: 50%; bottom: 60px;
        transform: translateX(-50%);
        width: 900px; height: 360px;
        background: linear-gradient(180deg, #2a1408 0%, #1a0a04 100%);
        border-radius: 14px 14px 0 0;
      }
      .fireplace::before {
        content: ""; position: absolute;
        inset: 20px 60px 0 60px;
        background:
          radial-gradient(ellipse at 50% 100%, #ffb850 0%, #ff5510 30%, #8a1010 60%, transparent 90%);
        border-radius: 50% 50% 0 0;
      }
      /* Logs */
      .log {
        position: absolute;
        background: linear-gradient(180deg, #6a3018 0%, #3a1808 100%);
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.6);
      }
      .log.l1 { bottom: 80px; left: 50%; transform: translateX(-50%) rotate(-3deg); width: 320px; height: 36px; }
      .log.l2 { bottom: 110px; left: 50%; transform: translateX(-70%) rotate(8deg); width: 280px; height: 32px; }
      /* Mantel */
      .mantel {
        position: absolute;
        left: 50%; bottom: 420px;
        transform: translateX(-50%);
        width: 1100px; height: 50px;
        background: linear-gradient(180deg, #6a4824 0%, #3a2412 100%);
        box-shadow: 0 10px 24px rgba(0,0,0,0.8);
      }
      /* Mantel photo (the clip) — in elaborate gilt frame */
      .mantel-frame {
        position: absolute;
        left: 50%; bottom: 480px;
        transform: translateX(-50%);
        width: 720px; height: 520px;
        background: #1a1612;
        border: 28px solid;
        border-image: linear-gradient(135deg, #d4a850 0%, #a07a30 50%, #d4a850 100%) 1;
        box-shadow:
          0 24px 60px rgba(0,0,0,0.8),
          inset 0 0 30px rgba(0,0,0,0.6),
          0 0 80px rgba(255,180,80,0.25);
      }
      .mantel-frame video {
        width: 100%; height: 100%; object-fit: cover;
        filter: sepia(0.2) contrast(1.05);
      }
      .candle {
        position: absolute;
        bottom: 470px;
        width: 24px; height: 80px;
        background: linear-gradient(180deg, #faf2dc 0%, #c8a060 100%);
        border-radius: 4px 4px 0 0;
      }
      .candle.left  { left: calc(50% - 470px); }
      .candle.right { right: calc(50% - 470px); }
      .flame {
        position: absolute; top: -22px; left: 50%;
        transform: translateX(-50%);
        width: 12px; height: 22px;
        background: radial-gradient(ellipse at center, #fff5a0 0%, #ffaa30 60%, transparent 100%);
        border-radius: 50% 50% 30% 30%;
        filter: blur(0.5px);
      }
      .vignette {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="frame_fireside" data-width="1920" data-height="1080">
      <div class="wall"></div>
      <div class="hearth-glow"></div>
      <div class="mantel-frame">
        <video id="clip" class="clip" src="../assets/clips/clip_demo.mp4"
               data-start="0" data-duration="5" data-track-index="0" data-has-audio="false"
               muted playsinline></video>
      </div>
      <div class="mantel"></div>
      <div class="candle left"><div class="flame"></div></div>
      <div class="candle right"><div class="flame"></div></div>
      <div class="fireplace">
        <div class="log l1"></div>
        <div class="log l2"></div>
      </div>
      <div class="vignette"></div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(".mantel-frame", { scale: 0.95, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.0 }, 0);
        // Flame flicker — finite
        const dur = 5; const cycle = 0.25;
        const repeats = Math.max(0, Math.floor(dur/cycle)-1);
        tl.to(".flame", { scaleY: 0.85, duration: 0.12, repeat: repeats, yoyo: true, ease: "sine.inOut" }, 0);
        tl.to(".hearth-glow", { opacity: 0.8, duration: 0.4, repeat: Math.max(0, Math.floor(dur/0.8)-1), yoyo: true, ease: "sine.inOut" }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["frame_fireside"] = tl;
      </script>
    </div>
  </body>
</html>
