# Sleep Network Base — neutral starting point for all Sleep Network channels.
#
# This is a valid standalone playbook (validates against schemas/styles/playbook.schema.json).
# Channel-specific playbooks (grandpa-huxley.yaml, midnight-magnates.yaml) DUPLICATE these
# values rather than inherit, because the loader doesn't support extends. Treat this file
# as the canonical reference: if a value here changes, update the channel playbooks too.

identity:
  name: "Sleep Network Base"
  category: minimalist
  mood: "calm, reflective, contemplative — late-night quiet"
  pace: slow
  best_for: "Sleep documentaries — long-form, low-stimulation, sleep-safe pacing"

visual_language:
  color_palette:
    primary: ["#c9a84c", "#8c6e23"]    # Brass gold + dimmed gold (network signature)
    accent: ["#f0e6d2", "#f5ead0"]     # Parchment cream tones
    background: "#0d0d1a"              # Dark night base — channels override
    text: "#f0e6d2"                    # Parchment cream — never raw white
    muted: "#6a6a7a"                   # Storm gray (AA-large compliant against dark bg)
  composition: "single subject, single soft light source, low-contrast for sleep"
  texture: "soft mist or grain at low opacity (≤30%), clean geometric shapes"

typography:
  headings:
    font: "Playfair Display"
    weight: 700
    line_height: 1.2
  body:
    font: "Georgia"
    weight: 400
    line_height: 1.6
  stat_card:
    font: "Playfair Display"
    weight: 700
    size_multiplier: 2.5
  scale_system: "major_third"
  weight_matrix:
    title: 700
    heading: 600
    body: 400
    caption: 400

motion:
  transitions: ["fade", "dissolve", "dip-to-black", "soft-vignette"]
  animation_style: "slow ease-in-out, no bounce, gentle drift, sleep-safe — never jarring"
  pacing_rules:
    min_scene_hold_seconds: 4.0
    max_scene_hold_seconds: 30.0
    text_card_hold_seconds: 5.0
    stat_card_hold_seconds: 4.5
    transition_duration_seconds: 1.5
  entrance: "fade-in over 1.5s with slight scale (0.97 → 1.0)"
  exit: "fade-out over 1.5s"

audio:
  voice_style: "calm, reflective, measured, sleep-pacing — never urgent"
  music_mood: "ambient, contemplative, low-energy — distant piano, soft strings, drone pads"
  music_volume: 0.05
  sfx_style: "minimal — soft whooshes only at major section breaks"
  ducking_threshold_db: -3
  voice_variation_allowed: false

asset_generation:
  image_prompt_prefix: "Simple flat segmented colors illustration, sleep documentary aesthetic, night scene, low-contrast, single soft light source, dark background, contemplative mood, calm composition, avoid bright whites in large areas, "
  image_negative_prompt: "bright saturated colors, harsh shadows, jarring contrast, motivational hustle imagery, frenetic motion, neon, modern UI elements"
  diagram_style: "low-contrast, soft strokes, parchment-cream lines on dark"
  consistency_anchors:
    - "Brass gold #c9a84c as the only saturated accent across the network"
    - "All text uses parchment cream #f0e6d2 — never raw white #ffffff"
    - "Single soft light source per scene — no competing highlights"
    - "Backgrounds remain dark (≤ 15% lightness) for sleep-safe viewing"
    - "Sleep-safe motion only — minimum 4s scene holds, no fast cuts"

quality_rules:
  - "All burned-in text uses parchment cream #f0e6d2 — never raw white"
  - "Music volume capped at 0.06 — voiceover must dominate"
  - "Minimum scene hold 4 seconds — sleep audience cannot tolerate fast cuts"
  - "No exclamation points in any on-screen text"
  - "No em dashes (—) — use commas, periods, or ellipses (Huxley hard rule, applied network-wide for consistency)"
  - "Maximum overlay opacity 30% — preserve background readability"
  - "Final render must be 1920x1080 minimum at 24fps"

chart_palette:
  - "#c9a84c"   # Brass gold (primary)
  - "#8c6e23"   # Dimmed gold
  - "#f0e6d2"   # Parchment
  - "#4a6fa5"   # Cool blue (secondary accent)
  - "#3a3a4a"   # Storm gray
  - "#d4a54a"   # Warm amber

color_rules:
  harmony_type: "analogous"
  contrast_validation: true
  colorblind_safe: true

# --- Network-shared identity (additional non-schema fields, kept for downstream stages) ---
network:
  name: "Sleep Network"
  closing_tagline: "If these stories speak to you... if you find comfort in the lessons found in the quiet corners of history, tap [subscribe/follow] to join our circle of dreamers, and let the next story find you when you need it most."
  delivery_constraints:
    final_resolution: "1080p"
    aspect_ratio: "16:9"
    fps: 24
    audience: "sleep listener — eyes-closed-friendly, voice-led"

# --- Clip treatment for potentially copyrighted third-party material (LOCKED 2026-05-21) ---
# Full skill: skills/core/clip-treatments.md
# Canonical config: projects/iran-us-history-clip-toolkit-v1/toolkit/approved_toolkit.json
# Shared sheet rows 22-33: 1v1pI_x1s7ermhkG1ryNxhNxelDQuliCM6l-3hHRwwY8
clip_treatment:
  defaults:
    copyrighted_video:
      filter: grade_cyan_orange
      audio_treatment: pitch_up_1st     # only if audio kept (vo-pause)
      wrap_in_frame: true
    copyrighted_image:
      filter: grade_crushed_warm
      wrap_in_frame: true
    copyrighted_audio:
      filter: pitch_up_1st              # standalone or kept-from-clip
    character_image:
      route_to: character_cards         # exempt from copyright wrap rule
  approved_frames:
    - {name: tv-vintage,   channels: [midnight_magnates, grandpa_huxley], best_for: "retro broadcast / archival news"}
    - {name: dossier,      channels: [midnight_magnates],                 best_for: "classified document reveal"}
    - {name: newspaper,    channels: [midnight_magnates, grandpa_huxley], best_for: "breaking news / headline"}
    - {name: fireside,     channels: [grandpa_huxley],                    best_for: "cozy storytelling"}
    - {name: surveillance, channels: [midnight_magnates],                 best_for: "spy / intelligence"}
    - {name: boardroom,    channels: [midnight_magnates],                 best_for: "power meeting / executive"}
    - {name: magnifier,    channels: [midnight_magnates, grandpa_huxley], best_for: "investigation / evidence detail"}
    - {name: library,      channels: [grandpa_huxley],                    best_for: "historical knowledge / reflection"}
  hard_rules:
    - "Source files capped at 5 minutes on disk"
    - "Frame-by-frame fit check before any transformation"
    - "Tag each clip audio role: vo-pause / vo-over / mixed"
    - "Output composited inside an approved frame — never bare"
    - "No substitution of locked filter recipes without explicit user override"
