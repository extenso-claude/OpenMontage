<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>G-voice — Voiceover Review</title>
<style>
  :root { --bg:#0a0f1a; --panel:#121a2b; --ink:#f5f0e4; --accent:#c9a84c; --red:#b41e1e; --green:#3a7d44; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.45 Georgia,serif; }
  header { position:sticky; top:0; background:#0a0f1ae6; backdrop-filter:blur(6px); padding:14px 20px; border-bottom:1px solid #243; z-index:5; }
  h1 { margin:0; font-size:18px; color:var(--accent); letter-spacing:2px; font-weight:700; }
  .sub { color:#9fb; opacity:.7; font-size:12px; }
  #wave { display:block; width:100%; height:70px; background:#0d1424; border-bottom:1px solid #243; }
  audio { width:100%; margin:8px 0 0; }
  main { max-width:1080px; margin:0 auto; padding:16px 20px 120px; }
  .seg { background:var(--panel); border:1px solid #243; border-left:4px solid #355; border-radius:6px; padding:10px 12px; margin:10px 0; }
  .seg.fail { border-left-color:var(--red); }
  .seg.approved { border-left-color:var(--green); }
  .seg .row1 { display:flex; gap:10px; align-items:baseline; }
  .badge { font:11px monospace; padding:2px 7px; border-radius:10px; letter-spacing:1px; }
  .badge.pass { background:#16321c; color:#8fd6a0; }
  .badge.fail { background:#3a1414; color:#f0a0a0; }
  .badge.approved { background:#2a2410; color:var(--accent); }
  .txt { flex:1; cursor:pointer; }
  .txt:hover { color:var(--accent); }
  .metrics { font:11px monospace; color:#89a; margin-top:4px; }
  .metrics b { color:#cdd; }
  .metrics .hot { color:#f0a0a0; }
  .controls { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  select, input, textarea { background:#0d1424; color:var(--ink); border:1px solid #355; border-radius:4px; padding:5px 7px; font:13px Georgia,serif; }
  textarea { flex:1; min-width:220px; resize:vertical; }
  .hint { display:none; gap:6px; flex-wrap:wrap; width:100%; }
  .hint.show { display:flex; }
  .hint input { width:130px; }
  footer { position:fixed; bottom:0; left:0; right:0; background:#0a0f1af2; border-top:1px solid #243; padding:12px 20px; display:flex; gap:12px; align-items:center; }
  button { font:14px Georgia,serif; padding:9px 18px; border-radius:6px; border:1px solid #355; cursor:pointer; }
  #approve { background:var(--green); color:#fff; border-color:#3a7d44; }
  #regen { background:#2a2410; color:var(--accent); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  #status { color:#9fb; font-size:13px; }
  .track { font:11px monospace; color:#789; }
</style>
</head>
<body>
<header>
  <h1>G-VOICE — VOICEOVER REVIEW</h1>
  <div class="sub" id="meta">loading…</div>
  <canvas id="wave"></canvas>
  <audio id="vo" src="/audio" controls preload="auto"></audio>
</header>
<main id="segs"></main>
<footer>
  <button id="approve">Approve voiceover ✓</button>
  <button id="regen">Send flagged for re-gen ↺</button>
  <span id="status"></span>
</footer>
<script>
const FIX_FIELDS = [["ipa","IPA /…/"],["break_ms","break ms"],["steering","[steering]"],["rate","rate 0.5–1.5"]];
let report = null;

function fmtMetrics(m){
  if(!m) return "";
  const hot=(v,bad)=> bad ? '<span class="hot">'+v+'</span>' : '<b>'+v+'</b>';
  return `WER ${hot(m.wer, m.wer>0.15)} · MOS ${hot(m.mos, m.mos<3.2)} · `+
         `rate ${hot(m.wps, m.wps>3.6||m.wps<1.8)} w/s · `+
         `clip ${hot(m.clipping, m.clipping)} · dropout ${hot(m.dropout, m.dropout)}`;
}

async function load(){
  report = await (await fetch('/voice_report.json')).json();
  const v = report.voice||{};
  document.getElementById('meta').textContent =
    `voice ${v.voice_id||'?'} · ${v.delivery_mode||'?'} · ${v.model_id||'?'} · ${ (report.segments||[]).length } segments`;
  const host = document.getElementById('segs');
  host.innerHTML='';
  (report.segments||[]).forEach((s,i)=>{
    const failing = s.status==='fail';
    const el=document.createElement('div');
    el.className='seg '+(s.status||'');
    el.dataset.id=s.id; el.dataset.start = (s.start_s!=null? s.start_s : '');
    el.innerHTML = `
      <div class="row1">
        <span class="badge ${s.status||'pass'}">${(s.status||'pass').toUpperCase()}</span>
        <span class="txt">${(s.text||s.text_markup||'(segment '+s.id+')').replace(/</g,'&lt;')}</span>
        <span class="track">${s.start_s!=null? '▶ '+(+s.start_s).toFixed(1)+'s':''}</span>
      </div>
      <div class="metrics">${fmtMetrics(s.metrics)}${s.fix_iterations!=null?' · fixes '+s.fix_iterations:''}</div>
      <div class="controls">
        <select class="action">
          <option value="keep">keep</option>
          <option value="regenerate" ${failing?'selected':''}>regenerate</option>
          <option value="approve">approve (override)</option>
        </select>
        <textarea class="note" placeholder="note (e.g. mispronounced 'Czolgosz' / rushed here)"></textarea>
        <div class="hint ${failing?'show':''}">
          ${FIX_FIELDS.map(([k,ph])=>`<input data-k="${k}" placeholder="${ph}">`).join('')}
        </div>
      </div>`;
    const sel=el.querySelector('.action'), hint=el.querySelector('.hint');
    sel.addEventListener('change',()=> hint.classList.toggle('show', sel.value==='regenerate'));
    el.querySelector('.txt').addEventListener('click',()=>{
      const st=parseFloat(el.dataset.start); const a=document.getElementById('vo');
      if(!isNaN(st)){ a.currentTime=st; a.play(); }
    });
    host.appendChild(el);
  });
}

function collect(){
  return [...document.querySelectorAll('.seg')].map(el=>{
    const action=el.querySelector('.action').value;
    const fix={}; el.querySelectorAll('.hint input').forEach(inp=>{ if(inp.value.trim()) fix[inp.dataset.k]=inp.value.trim(); });
    return { id:el.dataset.id, action, note:el.querySelector('.note').value.trim(), fix_hint:fix };
  });
}

async function submit(approved){
  const segments=collect();
  const regen=segments.filter(s=>s.action==='regenerate');
  if(approved && regen.length){
    document.getElementById('status').textContent =
      `Cannot approve: ${regen.length} segment(s) still marked 'regenerate'. Send those for re-gen, or change them to keep/approve.`;
    return;
  }
  const res=await (await fetch('/submit',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({approved, reviewer:'human', segments})})).json();
  document.getElementById('status').textContent = approved
    ? `Approved ✓ — wrote ${res.written}. The pipeline may now pass the voice stage.`
    : `Sent ${regen.length} segment(s) for re-generation. (approved=false; voice stage stays blocked.)`;
}
document.getElementById('approve').addEventListener('click',()=>submit(true));
document.getElementById('regen').addEventListener('click',()=>submit(false));

// Lightweight waveform (Web Audio peaks).
async function drawWave(){
  try{
    const buf=await (await fetch('/audio')).arrayBuffer();
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const audio=await ac.decodeAudioData(buf);
    const ch=audio.getChannelData(0), c=document.getElementById('wave'), w=c.width=c.clientWidth, h=c.height=70;
    const g=c.getContext('2d'); g.fillStyle='#c9a84c'; const step=Math.floor(ch.length/w)||1;
    for(let x=0;x<w;x++){ let peak=0; for(let j=0;j<step;j++){ peak=Math.max(peak,Math.abs(ch[x*step+j]||0)); }
      const bh=Math.max(1,peak*h); g.fillRect(x,(h-bh)/2,1,bh); }
  }catch(e){ /* no audio / decode unsupported — scrubber still works */ }
}
load(); drawWave();
</script>
</body>
</html>
